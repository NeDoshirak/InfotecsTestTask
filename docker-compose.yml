services:
  timeseries:
    image: timeseries
    build:
      context: .
      dockerfile: src/TimeSeries/Dockerfile
    ports:
      - "8080:8080"
      - "8081:8081"

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: timeseries
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/18/main

volumes:
  postgres-data: